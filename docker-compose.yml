services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: study-suite-backend
    ports:
      - "8000:8000"
    environment:
      VAULT_BASE_PATH: /data/vault/
      LOG_LEVEL: DEBUG
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    volumes:
      - ./vault:/data/vault
    restart: unless-stopped

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: study-suite-frontend
    ports:
      - "3002:3000"
    depends_on:
      - backend
    restart: unless-stopped

  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile.telegram
    container_name: study-suite-telegram-bot
    environment:
      BACKEND_BASE_URL: http://backend:8000
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_CHAT_IDS: ${TELEGRAM_ALLOWED_CHAT_IDS:-}
      TELEGRAM_ALLOWED_USERNAMES: ${TELEGRAM_ALLOWED_USERNAMES:-}
      TELEGRAM_BACKEND_API_KEY: ${TELEGRAM_BACKEND_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      - backend
    restart: unless-stopped
