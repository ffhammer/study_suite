services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: study-suite-backend
    ports:
      - "8000:8000"
    environment:
      VAULT_BASE_PATH: /data/vault/
      LOG_LEVEL: DEBUG
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    volumes:
      - ./vault:/data/vault
    restart: unless-stopped

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    container_name: study-suite-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
